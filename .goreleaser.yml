version: 2

builds:
  - id: evo-cli
    main: .
    binary: evo-cli
    ldflags:
      - -s -w
      - -X github.com/evopayment/evo-cli/internal/build.Version={{.Version}}
      - -X github.com/evopayment/evo-cli/internal/build.Date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: evopayment
    name: evo-cli
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
